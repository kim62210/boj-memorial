name: CI

on:
  pull_request:
    branches: [main, develop]
  merge_group:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  detect:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      has-js: ${{ steps.changes.outputs.js }}
      has-py: ${{ steps.changes.outputs.py }}
      has-go: ${{ steps.changes.outputs.go }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            js:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'package-lock.json'
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
            py:
              - 'pyproject.toml'
              - 'requirements*.txt'
              - '**/*.py'
            go:
              - 'go.mod'
              - 'go.sum'
              - '**/*.go'

  js:
    name: JS/TS
    needs: detect
    if: needs.detect.outputs.has-js == 'true' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --prefer-offline --no-audit
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --run
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-js
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

  py:
    name: Python
    needs: detect
    if: needs.detect.outputs.has-py == 'true' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then
            pip install -e ".[dev]" || pip install -e .
          fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install ruff pytest pytest-cov
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest -q --cov --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py
          path: coverage.xml
          retention-days: 7
          if-no-files-found: ignore

  go:
    name: Go
    needs: detect
    if: needs.detect.outputs.has-go == 'true' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - run: go vet ./...
      - run: go test -race -cover ./...

  required:
    name: Required Checks
    needs: [js, py, go]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Determine status
        run: |
          echo '${{ toJSON(needs) }}' | jq -e '[.[] | .result] | all(. == "success" or . == "skipped")' > /dev/null
